<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore - InnoVerse</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/transitions.js" defer></script>
    <script src="js/toast.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/app.js" defer></script>
    <script src="js/check-auth.js" defer></script>
</head>
<body class="bg-[#0B1120] text-white font-sans antialiased min-h-screen flex flex-col relative overflow-x-hidden">
    <!-- Decorative Background Elements -->
    <div class="absolute top-[5%] left-[-10%] w-96 h-96 bg-cyan-600/20 rounded-full blur-[120px] z-0 animate-pulse"></div>
    <div class="absolute bottom-[20%] right-[-5%] w-80 h-80 bg-violet-600/20 rounded-full blur-[100px] z-0 animate-pulse" style="animation-delay: 2s;"></div>

    <header class="sticky top-0 z-50 bg-[#0B1120]/70 backdrop-blur-xl border-b border-white/5">
        <nav class="flex justify-between items-center px-8 py-5">
        <a href="index.html" class="flex items-center gap-2 cursor-pointer">
            <div class="w-2.5 h-2.5 bg-cyan-400 rounded-full shadow-[0_0_12px_theme(colors.cyan.400)]"></div>
            <h1 class="text-xl font-bold tracking-wide text-white">InnoVerse</h1>
        </a>
        <div class="hidden md:flex items-center gap-8 text-[15px] font-medium text-gray-400">
            <a href="features.html" class="hover:text-white transition-colors cursor-pointer">Features</a>
            <a href="explore.html" class="text-white font-semibold cursor-pointer">Explore</a>
            <a href="collaborate.html" class="hover:text-white transition-colors cursor-pointer">Collaborate</a>
            <a href="#" class="hover:text-white transition-colors cursor-pointer">AI Tools</a>
            <a href="#" class="hover:text-white transition-colors cursor-pointer">Investors</a>
        </div>
        <div class="flex items-center gap-4">
            <button class="hidden md:block px-5 py-2 text-sm font-medium text-white bg-gradient-to-r from-violet-600 to-indigo-600 rounded-lg shadow-[0_0_15px_rgba(124,58,237,0.3)] btn-hover-effect cursor-pointer">Submit Project</button>
            <button id="mobile-menu-btn" class="md:hidden text-gray-400 hover:text-white focus:outline-none cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
            </button>
        </div>
        </div>
    </nav>
    </header>

    <div id="mobile-menu" class="hidden md:hidden bg-[#0B1120] border-b border-white/5 px-8 py-4">
        <div class="flex flex-col gap-4 text-[15px] font-medium text-gray-400">
            <a href="explore.html" class="text-white font-semibold">Explore</a>
            <button class="w-full px-5 py-2 text-sm font-medium text-white bg-blue-500 rounded-lg transition-all">Submit Project</button>
        </div>
    </div>

    <main class="flex-grow z-10 relative">
    <section class="max-w-7xl mx-auto px-8 py-20">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-6">
            <div class="animate-fade-in-up">
                <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">Explore Projects</h1>
                <p class="text-gray-400 text-lg max-w-2xl">Browse over 240+ live projects built by students.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Advanced Filter Sidebar -->
            <aside class="col-span-1 animate-fade-in-up delay-100">
                <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-2xl p-6 sticky top-28">
                    <h3 class="text-lg font-bold text-white mb-6 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" /></svg>
                        Filters
                    </h3>
                    
                    <div class="flex flex-col gap-6">
                        <!-- Search -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Search</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500 group-focus-within:text-cyan-400 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                                </div>
                                <input type="text" id="projectSearch" placeholder="Keywords..." class="bg-white/5 border border-white/10 rounded-lg pl-9 pr-4 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-500 w-full transition-all">
                            </div>
                        </div>

                        <!-- Sort -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Sort By</label>
                            <select id="sortFilter" class="bg-white/5 border border-white/10 rounded-lg px-4 py-2.5 text-sm text-white focus:outline-none focus:border-cyan-500 w-full appearance-none custom-select">
                                <option value="newest" class="bg-[#11131a]">Newest First</option>
                                <option value="likes" class="bg-[#11131a]">Most Liked</option>
                            </select>
                        </div>

                        <!-- Category -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Category</label>
                            <div class="flex flex-col gap-2">
                                <label class="flex items-center gap-2 text-sm text-gray-300 hover:text-white cursor-pointer"><input type="checkbox" class="category-filter accent-cyan-500" value="healthcare"> Healthcare</label>
                                <label class="flex items-center gap-2 text-sm text-gray-300 hover:text-white cursor-pointer"><input type="checkbox" class="category-filter accent-cyan-500" value="fintech"> FinTech</label>
                                <label class="flex items-center gap-2 text-sm text-gray-300 hover:text-white cursor-pointer"><input type="checkbox" class="category-filter accent-cyan-500" value="education"> Education</label>
                                <label class="flex items-center gap-2 text-sm text-gray-300 hover:text-white cursor-pointer"><input type="checkbox" class="category-filter accent-cyan-500" value="ecommerce"> E-Commerce</label>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Projects Grid -->
            <div class="col-span-1 lg:col-span-3">
                <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6 animate-fade-in-up delay-200">
                    <!-- Projects will be dynamically populated here by JS -->
                </div>
            </div>
        </div>
    </section>
    </main>

    <footer class="border-t border-white/5 bg-[#0B1120] mt-auto">
        <div class="max-w-7xl mx-auto px-8 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-cyan-400 rounded-full shadow-[0_0_8px_theme(colors.cyan.400)]"></div>
                <span class="text-white font-bold tracking-wide">InnoVerse</span>
            </div>
            <p class="text-gray-500 text-sm">© 2026 Christ University. All rights reserved.</p>
            <div class="flex gap-4 text-sm text-gray-400">
                <a href="#" class="hover:text-white transition-colors">Privacy</a>
                <a href="#" class="hover:text-white transition-colors">Terms</a>
            </div>
        </div>
    </footer>

</body>
</html>
