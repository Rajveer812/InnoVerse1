<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - InnoVerse</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/transitions.js" defer></script>
    <script src="js/toast.js" defer></script>
    <script src="js/auth.js" defer></script>
    <style>
        .glass-card {
            background: rgba(17, 19, 26, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        .form-transition {
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
        }
        .hidden-form {
            opacity: 0;
            pointer-events: none;
            position: absolute;
            transform: scale(0.95);
        }
        .active-form {
            opacity: 1;
            pointer-events: auto;
            position: relative;
            transform: scale(1);
        }
        /* Custom animated background elements */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: float 10s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }
    </style>
</head>
<body class="bg-[#0B1120] text-white font-sans antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
    
    <!-- Background Animated Blobs -->
    <div class="blob bg-violet-600 w-96 h-96 rounded-full top-[-10%] left-[-10%]"></div>
    <div class="blob bg-cyan-600 w-80 h-80 rounded-full bottom-[-10%] right-[-10%] animation-delay-2000"></div>

    <a href="index.html" class="absolute top-8 left-8 flex items-center gap-2 cursor-pointer z-10 hover:opacity-80 transition-opacity">
        <div class="w-2.5 h-2.5 bg-cyan-400 rounded-full shadow-[0_0_12px_theme(colors.cyan.400)]"></div>
        <h1 class="text-xl font-bold tracking-wide text-white">InnoVerse</h1>
    </a>

    <div class="glass-card rounded-2xl w-full max-w-md p-8 relative overflow-hidden z-10">
        
        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="absolute inset-0 bg-[#0B1120]/80 backdrop-blur-sm z-50 hidden flex-col items-center justify-center">
            <div class="w-10 h-10 border-4 border-white/20 border-t-cyan-400 rounded-full animate-spin"></div>
            <p class="mt-4 text-sm font-medium text-gray-300 tracking-wide animate-pulse">Authenticating...</p>
        </div>

        <!-- Alert Box Removed for Toast System -->

        <!-- Login Form -->
        <div id="loginFormContainer" class="form-transition active-form">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
                <p class="text-gray-400 text-sm">Enter your credentials to access your account.</p>
            </div>

            <form id="loginForm" class="flex flex-col gap-5">
                <div>
                    <label for="loginEmail" class="block text-sm font-medium text-gray-300 mb-1.5">Email Address</label>
                    <input type="email" id="loginEmail" required class="w-full bg-[#1a1d26]/80 border border-gray-700/50 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder-gray-500 backdrop-blur-md" placeholder="name@example.com">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1.5">
                        <label for="loginPassword" class="block text-sm font-medium text-gray-300">Password</label>
                        <a href="#" class="text-xs text-cyan-400 hover:text-cyan-300 transition-colors">Forgot password?</a>
                    </div>
                    <input type="password" id="loginPassword" required class="w-full bg-[#1a1d26]/80 border border-gray-700/50 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all placeholder-gray-500 backdrop-blur-md" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full mt-2 py-3 px-4 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-white font-bold rounded-lg shadow-[0_0_15px_rgba(6,182,212,0.3)] hover:shadow-[0_0_25px_rgba(6,182,212,0.5)] transition-all transform hover:-translate-y-0.5 cursor-pointer">
                    Sign In
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-400">
                    Don't have an account? 
                    <button id="showRegisterBtn" class="text-cyan-400 font-semibold hover:text-cyan-300 transition-colors cursor-pointer focus:outline-none">Sign up</button>
                </p>
            </div>
        </div>

        <!-- Register Form -->
        <div id="registerFormContainer" class="form-transition hidden-form">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-white mb-2">Create Account</h2>
                <p class="text-gray-400 text-sm">Join InnoVerse to showcase and collaborate.</p>
            </div>

            <form id="registerForm" class="flex flex-col gap-5">
                <div>
                    <label for="registerName" class="block text-sm font-medium text-gray-300 mb-1.5">Full Name</label>
                    <input type="text" id="registerName" required minlength="2" class="w-full bg-[#1a1d26]/80 border border-gray-700/50 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-all placeholder-gray-500 backdrop-blur-md" placeholder="John Doe">
                </div>
                <div>
                    <label for="registerEmail" class="block text-sm font-medium text-gray-300 mb-1.5">Email Address</label>
                    <input type="email" id="registerEmail" required class="w-full bg-[#1a1d26]/80 border border-gray-700/50 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-all placeholder-gray-500 backdrop-blur-md" placeholder="name@example.com">
                </div>
                <div>
                    <label for="registerPassword" class="block text-sm font-medium text-gray-300 mb-1.5">Password</label>
                    <input type="password" id="registerPassword" required minlength="6" class="w-full bg-[#1a1d26]/80 border border-gray-700/50 rounded-lg px-4 py-3 text-white text-sm focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition-all placeholder-gray-500 backdrop-blur-md" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full mt-2 py-3 px-4 bg-gradient-to-r from-violet-500 to-fuchsia-600 hover:from-violet-400 hover:to-fuchsia-500 text-white font-bold rounded-lg shadow-[0_0_15px_rgba(139,92,246,0.3)] hover:shadow-[0_0_25px_rgba(139,92,246,0.5)] transition-all transform hover:-translate-y-0.5 cursor-pointer">
                    Create Account
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-gray-400">
                    Already have an account? 
                    <button id="showLoginBtn" class="text-violet-400 font-semibold hover:text-violet-300 transition-colors cursor-pointer focus:outline-none">Sign in</button>
                </p>
            </div>
        </div>

    </div>
</body>
</html>
